---
name: prepare-ci-env
description: Prepare CI Environment

inputs:
  cache-only:
    required: false
    default: "false"
    description: If `true`, skip pulling the caches, but create the missing cache entries

runs:
  using: composite
  steps:
    - name: Set up Python
      id: install_python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7
      with:
        python-version: '3.14'

    - name: Install `mise`
      id: install_mise
      uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4
      with:
        env: false  # Do not load the environment section from `mise.toml` into GITHUB_ENV
        install: true

    - name: Install Node dependencies
      id: install_node_deps
      shell: bash
      # node/npm come from mise (see mise.toml [tools] node), installed+activated
      # by the mise step above. `node_modules/` is gitignored, so CI has no
      # project deps by default. Without this, `npx eslint` (pre-commit hook +
      # `mise run lint:js`) would fetch the latest ESLint instead of the
      # package-lock-pinned version and fail to resolve `require('@eslint/js')`.
      run: npm ci --no-audit --no-fund

    - name: Cache pre-commit hooks
      id: cache_pre_commit
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
      with:
        lookup-only: ${{ inputs.cache-only == 'true' }}
        path: ~/.cache/pre-commit
        key: >-
          pre-commit-3-py${{ steps.install_python.outputs.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: Force reinstall pre-commit hooks on cache miss
      if: ${{ steps.cache_pre_commit.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        pre-commit install-hooks --color=always
