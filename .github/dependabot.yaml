---
version: 2
updates:
  # Pinned GitHub Actions SHAs. Grouped so a single PR carries every bump,
  # which the dependabot-automerge workflow can validate and land hands-free.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: monthly
